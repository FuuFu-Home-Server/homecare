name: release

# Build the Windows installer on a Windows runner (native modules compile against
# electron/win32) and publish it to a GitHub Release. Triggered by pushing a
# v<version> tag, or manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # electron-builder needs this to create the Release + upload assets

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # @electron/rebuild needs >=22.12; native rebuild for electron
          cache: npm

      # windows-latest ships Python 3.12 which dropped distutils → node-gyp source
      # builds of better-sqlite3-multiple-ciphers fail. Pin 3.11.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: npm ci
        env:
          npm_config_msvs_version: "2022"

      # build:desktop (static export) + electron:build (esbuild) + electron-builder
      # --win --publish always. GH_TOKEN is the auto-provided Actions token.
      - run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
