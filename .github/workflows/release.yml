name: release

# Build the Windows installer on a Windows runner (native modules compile against
# electron/win32) and publish it to a GitHub Release. Triggered by pushing a
# v<version> tag, or manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # electron-builder needs this to create the Release + upload assets

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # @electron/rebuild needs >=22.12; native rebuild for electron
          cache: npm

      # windows-latest ships Python 3.12 which dropped distutils → node-gyp source
      # builds of better-sqlite3-multiple-ciphers fail. Pin 3.11.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: npm ci
        env:
          npm_config_msvs_version: "2022"

      - name: Resolve version tag
        id: ver
        shell: bash
        run: echo "v=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # electron-builder uploads the .exe and .blockmap concurrently; if the
      # release doesn't exist yet, BOTH try to create it and race — one asset gets
      # orphaned. Pre-creating the draft means neither upload creates it.
      - name: Ensure draft release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ steps.ver.outputs.v }}
        run: gh release view "$VER" >/dev/null 2>&1 || gh release create "$VER" --draft --title "$VER" --notes "Automated release $VER"

      # build:desktop (static export) + electron:build (esbuild) + electron-builder
      # --win --publish always → uploads into the existing draft (no create race).
      - run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ steps.ver.outputs.v }}
        run: gh release edit "$VER" --draft=false
